<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World 🧧</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      background-size: 400% 400%;
      animation: gradientShift 8s ease infinite;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
      padding: 20px;
      overflow: hidden;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 60px 50px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow:
        0 25px 60px rgba(0, 0, 0, 0.15),
        0 8px 20px rgba(0, 0, 0, 0.1);
      animation: cardEntry 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      position: relative;
    }

    @keyframes cardEntry {
      0% {
        opacity: 0;
        transform: translateY(40px) scale(0.95);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .emoji-top {
      font-size: 56px;
      margin-bottom: 20px;
      animation: bounce 2s ease-in-out infinite;
      display: inline-block;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-12px); }
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
      animation: titleFade 1s ease 0.3s both;
    }

    @keyframes titleFade {
      0% { opacity: 0; transform: translateY(15px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .subtitle {
      font-size: 1.15rem;
      color: #6b7280;
      font-weight: 400;
      letter-spacing: 0.5px;
      animation: titleFade 1s ease 0.6s both;
    }

    .divider {
      width: 60px;
      height: 4px;
      background: linear-gradient(90deg, #667eea, #f093fb);
      border-radius: 2px;
      margin: 28px auto;
      animation: dividerGrow 0.8s ease 0.5s both;
    }

    @keyframes dividerGrow {
      0% { width: 0; opacity: 0; }
      100% { width: 60px; opacity: 1; }
    }

    .footer {
      margin-top: 32px;
      font-size: 0.85rem;
      color: #9ca3af;
      animation: titleFade 1s ease 0.9s both;
    }

    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin: 0 4px;
      vertical-align: middle;
    }
    .dot:nth-child(1) { background: #667eea; }
    .dot:nth-child(2) { background: #764ba2; }
    .dot:nth-child(3) { background: #f093fb; }

    /* Floating particles */
    .particle {
      position: fixed;
      border-radius: 50%;
      opacity: 0.15;
      pointer-events: none;
    }
    .p1 { width: 300px; height: 300px; background: #fff; top: -80px; right: -60px; animation: float1 6s ease-in-out infinite; }
    .p2 { width: 200px; height: 200px; background: #fff; bottom: -40px; left: -40px; animation: float2 8s ease-in-out infinite; }
    .p3 { width: 120px; height: 120px; background: #ffd700; top: 50%; left: 10%; animation: float1 10s ease-in-out infinite reverse; }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50%      { transform: translate(20px, -30px) rotate(5deg); }
    }
    @keyframes float2 {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50%      { transform: translate(-15px, 20px) rotate(-5deg); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .card {
        padding: 40px 28px;
        border-radius: 18px;
      }
      h1 {
        font-size: 2rem;
      }
      .subtitle {
        font-size: 1rem;
      }
      .emoji-top {
        font-size: 42px;
      }
    }
  </style>
</head>
<body>
  <div class="particle p1"></div>
  <div class="particle p2"></div>
  <div class="particle p3"></div>

  <div class="card">
    <div class="emoji-top">🧧</div>
    <h1>Hello World 🧧</h1>
    <div class="divider"></div>
    <p class="subtitle">来自发发的第一个网页</p>
    <div class="footer">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </div>
</body>
</html>
